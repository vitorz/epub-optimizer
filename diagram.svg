<svg width="650" height="600" viewBox="0 0 650 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <g id="eInkTablet">
      <rect x="0" y="0" width="150" height="200" rx="10" ry="10" fill="#f0f0f0" stroke="#333" stroke-width="3"/>
      <rect x="15" y="20" width="120" height="160" fill="#e0e0e0" stroke="#666" stroke-width="1"/>
    </g>

    <g id="originalDiagram">
      <rect x="3" y="60" width="120" height="80" fill="none" stroke="#666" stroke-width="4" stroke-dasharray="2,2"/>
      <polygon points="3,60 3,90 100,80" fill="none" stroke="#666" stroke-width="1" />
      <rect x="70" y="90" width="50" height="50" fill="none" stroke="#666" stroke-width="1" />
    </g>
  </defs>

  <g transform="translate(50, 50)">
    <use href="#eInkTablet"/>
    <g transform="translate(25, 30) scale(0.8)">
      <use href="#originalDiagram"/>
    </g>
    <text x="75" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#333">1. Original Content</text>
  </g>

  <g transform="translate(450, 50)">
    <use href="#eInkTablet"/>
    <g transform="translate(12, 12)">
      <svg width="120" height="125" viewBox="14 14 92 132"> <use href="#originalDiagram"/>
      </svg>
    </g>
    <text x="75" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#333">2. Crop Border</text>
  </g>

  <g transform="translate(50, 320)">
    <use href="#eInkTablet"/>
    <g transform="translate(18, 40)">
      <svg width="125" height="120" viewBox="14 14 132 92">
        <g transform="rotate(90 90 90)"> <use href="#originalDiagram"/>
        </g>
      </svg>
    </g>
    <text x="75" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#333">3. Rotate 90°</text>
  </g>

  <g transform="translate(450, 320)">
    <use href="#eInkTablet"/>
    <g transform="translate(-9, 10)">
      <svg width="170" height="170" viewBox="14 14 132 92">
        <g transform="rotate(90 90 90)"> <use href="#originalDiagram"/>
        </g>
      </svg>
    </g>
    <text x="75" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#333">4. Zoom to Fit</text>
  </g>
</svg>
